apply plugin: 'com.android.application'

android {
    namespace = "com.milon.multimedia"
    
    // লাইব্রেরি কম্প্যাটিবিলিটি এবং জাভা সোর্স এরর দূর করতে এটি ৩৬ করা হয়েছে
    compileSdk 36 

    defaultConfig {
        applicationId "com.milon.multimedia"
        
        // এরর দূর করতে এটি ২১ থেকে বাড়িয়ে ২৪ করা হয়েছে (অ্যান্ড্রয়েড ৭.০+)
        minSdkVersion 24        
        
        // বর্তমান রিকয়ারমেন্ট অনুযায়ী এটি ৩৬ করা হয়েছে
        targetSdkVersion 36 
        
        versionCode 1
        versionName "1.0"
        
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        
        aaptOptions {
             ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }

    // জাভা ৮ কম্প্যাটিবিলিটি নিশ্চিত করা
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:1.6.1"
    implementation "androidx.coordinatorlayout:coordinatorlayout:1.2.0"
    implementation "androidx.core:core-splashscreen:1.0.1"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:4.13.2"
    androidTestImplementation "androidx.test.ext:junit:1.1.5"
    androidTestImplementation "androidx.test.espresso:espresso-core:3.5.1"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.exists()) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied.")
}